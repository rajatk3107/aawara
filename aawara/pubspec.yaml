name: aawara
description: "Aawara - Personal fitness tracker built with Flutter"
publish_to: 'none'
version: 1.0.6+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  confetti: ^0.7.0
  audioplayers: ^6.0.0
  image_picker: ^1.1.2
  image_cropper: ^7.0.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  flutter_quill: ^10.0.0
  sqflite: ^2.3.3
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.20.0
  fl_chart: ^0.68.0
  share_plus: ^10.0.0
  file_picker: ^8.0.7
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0
  flutter_timezone: ^5.0.2
  mobile_scanner: ^6.0.0
  http: ^1.2.2
  pedometer: ^4.0.0
  flutter_background_service: ^5.0.0
  health: ^13.1.4
  permission_handler: ^11.0.0
  package_info_plus: ^8.0.0

dependency_overrides:
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app-icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.jpg
    - assets/app-icon.png
